name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(release)')
    concurrency:
      group: release
      cancel-in-progress: false
    outputs:
      released: ${{ steps.semrel.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4

      - run: uv sync --group dev

      - name: Semantic Release
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(uv run semantic-release version --changelog --push --tag --vcs-release 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.released == 'true'
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - run: git pull --rebase

      - run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
